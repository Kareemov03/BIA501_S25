<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التوصيات الذكية | SmartRecs</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Cairo for Arabic -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-background"></div>
    
    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-dna"></i>
            <h1>SmartRecs</h1>
        </div>
        <p class="subtitle">توصيات مخصصة بالخوارزميات الجينية</p>
    </header>

    <main class="container">
        <!-- User Selection Section -->
        <section class="user-selection glass-panel">
            <h2><i class="fa-solid fa-user-astronaut"></i> اختر مستخدماً لمحاكاة التوصيات</h2>
            <div class="select-wrapper">
                <select id="userSelect">
                    <option value="" disabled selected>جاري تحميل المستخدمين...</option>
                </select>
            </div>
            <button id="generateBtn" class="primary-btn" disabled>
                <i class="fa-solid fa-wand-magic-sparkles"></i> توليد التوصيات الذكية
            </button>
        </section>

        <!-- Loading / Evolution Process -->
        <section id="evolutionProcess" class="evolution-process glass-panel hidden">
            <h2><i class="fa-solid fa-microscope"></i> يتم الآن تطوير التوصيات...</h2>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="generationText" class="generation-text">الجيل: 0 / 15</p>
            <div class="metrics">
                <div class="metric-box">
                    <span class="label">أعلى ملاءمة (Fitness)</span>
                    <span id="bestFitness" class="value">0</span>
                </div>
            </div>
        </section>

        <!-- Final Recommendations -->
        <section id="recommendationsSection" class="recommendations-section hidden">
            <h2 class="section-title"><i class="fa-solid fa-crown"></i> أفضل التوصيات لك (الجيل النهائي)</h2>
            <div id="productsGrid" class="products-grid">
                <!-- Product Cards will be injected here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
